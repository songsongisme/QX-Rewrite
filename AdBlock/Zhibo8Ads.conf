// ==UserScript==
// @ScriptName        直播吧净化
// @Author            @songsong
// @UpdateTime        2026-04-07
// @Function          去除直播吧APP全部广告(开屏/插屏/弹窗/信息流/比赛页)及广告追踪统计
// @Suitable          自行观看"# > "注释内容
// @Attention         使用前请卸载直播吧APP，挂载脚本然后使用
// @Attention         如需引用请注明出处，谢谢合作！
// @Version           V1.0.3
// @ScriptURL         https://raw.githubusercontent.com/ddgksf2013/Rewrite/refs/heads/master/AdBlock/Zhibo8Ads.conf
// ==/UserScript==


hostname = a.qiumibao.com, s.qiumibao.com, api.qiumibao.com


# ======= 广告调度服务器[HTTP-IP直连] ======= #
# > 直播吧_开屏广告
^http:\/\/47\.111\.8\.123:8091\/allOne\.php\?ad_name=main_splash url reject-200
# > 直播吧_重要位置广告
^http:\/\/47\.111\.8\.123:8091\/allOne\.php\?ad_name=main_important url reject-200
# > 直播吧_插屏广告
^http:\/\/47\.111\.8\.123:8091\/allOne\.php\?ad_name=main_inter url reject-200
# > 直播吧_比赛页广告
^http:\/\/47\.111\.8\.123:8091\/allOne\.php\?ad_name=main_match url reject-200
# > 直播吧_弹窗广告
^http:\/\/47\.111\.8\.123:8091\/allOne\.php\?ad_name=main_popup url reject-200
# > 直播吧_通用广告请求[兜底匹配]
^http:\/\/47\.111\.8\.123:8091\/allOne\.php url reject-200


# ======= APP配置广告开关 ======= #
# > 直播吧_关闭APP内广告总开关及各广告位开关
^https?:\/\/a\.qiumibao\.com\/ios\/config\/ url jsonjq-response-body '.advert.enable = "false" | .advert_config.splash_bk = "disable" | .advert_config.inter_bk = "disable" | .advert_config.pop_bk = "disable" | .advert_config.other_bk = "disable" | .advert_config.splash_bk_show_times = 0 | .advert_config.activities_config = []'
# > 直播吧_活动配置
^https?:\/\/a\.qiumibao\.com\/activities\/config\.php url reject-dict


# ======= 推荐页视频信息流 ======= #
# > 直播吧_推荐页过滤短视频(保留纯新闻信息流)
^https?:\/\/api\.qiumibao\.com\/application\/app\/\?_url=\/news\/hot url script-response-body https://raw.githubusercontent.com/songsongisme/QX-Rewrite/refs/heads/main/AdBlock/Scripts/zhibo8_feed.js


# ======= 广告素材请求 ======= #
# > 直播吧_信息流原生广告素材
^https?:\/\/s\.qiumibao\.com\/activities\/material\/json\.htm url reject-dict


# ======= 广告追踪与计数 ======= #
# > 直播吧_广告点击及竞价计数
host, ggck.qiumibao.com, reject
# > 直播吧_广告曝光上报
host, impress.qiumibao.com, reject
# > 直播吧_广告行为上传[注意:仅拦截ggtg子域名,不影响tu/duihui等正常图片CDN]
host, ggtg.duoduocdn.com, reject


# ======= 数据统计 ======= #
# > 直播吧_用户行为统计
host, tongji.qiumibao.com, reject
# > 直播吧_请求上报统计
host, req-report.qiumibao.com, reject
# > 直播吧_头条上报
host, appck.qiumibao.com, reject


# ======= 第三方广告SDK ======= #
# > 阿里Tanx广告SDK_配置
host, sdk-config.tanx.com, reject
# > 阿里Tanx广告SDK_追踪
host, et.tanx.com, reject
# > 阿里Tanx广告SDK_数据
host, opehs.tanx.com, reject
# > 字节穿山甲广告SDK资源
^https?:\/\/lf-cdn-tos\.bytescm\.com\/obj\/static\/ad\/ url reject-200
# > 抖音Pangle开放平台广告配置
^https?:\/\/webcast-open\.douyin\.com\/webcast\/openapi\/pangle\/ url reject-200
# > 巨量引擎广告事件回调
host, pig.pupuapi.com, reject
# > 字节SDK性能监控上报
host, apmplus.volces.com, reject
